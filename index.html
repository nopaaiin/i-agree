<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Credit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background-color: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── 배경 레이어 ── */
    .main-bg {
      position: fixed;
      inset: 0;
      background-image: url('assets/main.png');
      background-size: cover;
      background-position: center;
      filter: blur(40px) brightness(0.5);
      transform: scale(1.05);
      z-index: 1;
    }

    .main-fg {
      position: fixed;
      inset: 0;
      background-image: url('assets/main.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 1;
    }

    /* ── HUD + GO 버튼 ── */
    .btn-group {
      position: fixed;
      right: 1.5%;
      bottom: 3%;
      width: 26%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      z-index: 20;
    }

    .hud {
      color: #ccff00;
      font-family: monospace;
      font-size: 11px;
      opacity: 0.8;
      line-height: 1.6;
      pointer-events: none;
      white-space: pre;
      text-align: right;
    }

    .go-btn {
      width: 100%;
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
    }

    .go-btn:active {
      transform: scale(0.92);
    }

    /* ── 동의 카운터 ── */
    .agree-counter {
      position: fixed;
      bottom: 3%;
      left: 3%;
      font-family: monospace;
      font-size: 14px;
      color: #ccff00;
      opacity: 0.9;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes counterBlink {
      0%   { opacity: 0.9; }
      40%  { opacity: 0.3; }
      100% { opacity: 0.9; }
    }

    .agree-counter-num.blink {
      animation: counterBlink 0.2s ease;
    }

    /* ── 레이아웃 페이지 ── */
    .layout-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 50;
      animation: fadeIn 0.3s ease;
    }

    .layout-box {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 80vh;
      z-index: 51;
    }

    .layout-img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }

    .layout-hotspot {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 50%;
      height: 50%;
      cursor: pointer;
    }

    .layout-hotspot:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    /* ── 오버레이 ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      animation: fadeIn 0.3s ease;
    }

    .overlay.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── 팝업 박스 공통 ── */
    .modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      height: 80vh;
      width: auto;
    }

    .modal.active {
      display: block;
    }

    .modal-img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }

    .modal-content {
      position: relative;
      height: 100%;
      width: 100%;
    }

    .stamp {
      position: absolute;
      right: 8%;
      bottom: 4%;
      width: 15%;
      height: auto;
      pointer-events: none;
      opacity: 0;
      transform: scale(1.5) rotate(-12deg) translateY(-30px);
    }

    @keyframes stampDrop {
      from { opacity: 0; transform: scale(1.5) rotate(-12deg) translateY(-30px); }
      to   { opacity: 1; transform: scale(1) rotate(0deg) translateY(0); }
    }

    .stamp.dropped {
      animation: stampDrop 0.15s ease-out forwards;
    }

    @keyframes contentShake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-4px); }
      40%  { transform: translateX(4px); }
      60%  { transform: translateX(-2px); }
      80%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    .modal-content.shaking {
      animation: contentShake 0.1s ease;
    }

    @keyframes flashFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* 박스 01 */
    @keyframes popIn1 {
      from { opacity: 0; transform: translate(calc(-50% - 120px), calc(-50% - 80px)) rotate(-3deg) scale(0.95); }
      to   { opacity: 1; transform: translate(calc(-50% - 120px), calc(-50% - 80px)) rotate(-3deg) scale(1); }
    }

    .modal-1 {
      transform: translate(calc(-50% - 120px), calc(-50% - 80px)) rotate(-3deg);
      z-index: 101;
    }

    .modal-1.active { animation: popIn1 0.3s ease; }

    /* 박스 02 */
    @keyframes popIn2 {
      from { opacity: 0; transform: translate(calc(-50% + 140px), calc(-50% - 40px)) rotate(2deg) scale(0.95); }
      to   { opacity: 1; transform: translate(calc(-50% + 140px), calc(-50% - 40px)) rotate(2deg) scale(1); }
    }

    .modal-2 {
      transform: translate(calc(-50% + 140px), calc(-50% - 40px)) rotate(2deg);
      z-index: 102;
    }

    .modal-2.active { animation: popIn2 0.3s ease; }

    /* 박스 03 */
    @keyframes popIn3 {
      from { opacity: 0; transform: translate(calc(-50% + 60px), calc(-50% + 110px)) rotate(-1.5deg) scale(0.95); }
      to   { opacity: 1; transform: translate(calc(-50% + 60px), calc(-50% + 110px)) rotate(-1.5deg) scale(1); }
    }

    .modal-3 {
      transform: translate(calc(-50% + 60px), calc(-50% + 110px)) rotate(-1.5deg);
      z-index: 103;
    }

    .modal-3.active { animation: popIn3 0.3s ease; }

    /* 헤더 */
    .modal-header {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }

    .modal-close {
      font-size: 18px;
      color: #000;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      padding: 0;
    }

    .modal-close:hover { color: #333; }

    .modal-id {
      font-family: monospace;
      font-size: 11px;
      color: #000;
    }

    /* ── 알림 토스트 ── */

    /* wrapper: 전체 뷰포트 너비, top 50% 기준으로 translateY(-50%) = 수직 중앙 */
    .toast-wrapper {
      position: fixed;
      left: 0;
      top: 50%;
      width: 100vw;
      transform: translateY(-50%);
      transition: transform 0.3s ease;
      pointer-events: none;
      display: flex;
      justify-content: center;
    }

    /* 일반 알림 */
    .toast {
      width: 60%;
      padding: 16px 32px;
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #ccff00;
      box-shadow: 0 0 20px rgba(204, 255, 0, 0.4);
      font-family: monospace;
      font-size: 14px;
      color: #ccff00;
      text-align: center;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.3s ease-out, transform 0.3s ease-out;
    }

    .toast.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* 클라이맥스 알림 */
    .toast-final {
      width: 75%;
      padding: 36px 48px;
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #ccff00;
      box-shadow: 0 0 50px rgba(204, 255, 0, 0.9), 0 0 100px rgba(204, 255, 0, 0.5), 0 0 150px rgba(204, 255, 0, 0.25);
      font-family: monospace;
      font-size: 20px;
      color: #ccff00;
      text-align: center;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }

    .toast-final.visible {
      opacity: 1;
      transform: scale(1);
    }

    @keyframes toastShake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-6px); }
      30%  { transform: translateX(6px); }
      45%  { transform: translateX(-4px); }
      60%  { transform: translateX(4px); }
      75%  { transform: translateX(-2px); }
      90%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    .toast-final.shake {
      animation: toastShake 0.15s ease;
    }

    /* 클라이맥스 오버레이 */
    .climax-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      pointer-events: none;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="main-bg"></div>
  <div class="main-fg"></div>

  <!-- 레이아웃 페이지 -->
  <div class="layout-overlay" id="layout-overlay"></div>
  <div class="layout-box" id="layout-box">
    <img class="layout-img" src="assets/layout.png" alt="">
    <div class="layout-hotspot" onclick="enterTerms()"></div>
  </div>

  <!-- 동의 카운터 -->
  <div class="agree-counter" id="agree-counter" style="visibility: hidden;">
    <div>AGREEMENTS LOGGED</div>
    <div>━━━━━━━━━━━━━</div>
    <div class="agree-counter-num" id="counter-num">[ 0000 ]</div>
  </div>

  <!-- HUD + GO 버튼 -->
  <div class="btn-group">
    <div class="hud" id="hud"></div>
    <img
      class="go-btn"
      src="assets/go.png"
      alt="GO"
      onclick="showAgreePage()"
    >
  </div>

  <div class="overlay" id="overlay"></div>

  <!-- 팝업 박스들 -->
  <div class="modal modal-1" id="modal-1">
    <div class="modal-content" id="content-1">
      <img class="modal-img" src="assets/agree.png" alt="">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal('modal-1')">✕</button>
        <span class="modal-id">01 / 03</span>
      </div>
    </div>
  </div>

  <div class="modal modal-2" id="modal-2">
    <div class="modal-content" id="content-2">
      <img class="modal-img" src="assets/agree.png" alt="">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal('modal-2')">✕</button>
        <span class="modal-id">02 / 03</span>
      </div>
    </div>
  </div>

  <div class="modal modal-3" id="modal-3">
    <div class="modal-content" id="content-3">
      <img class="modal-img" src="assets/agree.png" alt="">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal('modal-3')">✕</button>
        <span class="modal-id">03 / 03</span>
      </div>
    </div>
  </div>


  <script>
    /* ── HUD ── */
    const hud = document.getElementById('hud');
    let lat = 37.5547213;
    let lon = 126.9706482;
    let frame = 4829;

    function rand() { return Math.random() * 0.0002 - 0.0001; }
    function pad(n) { return String(n).padStart(5, '0'); }

    setInterval(() => {
      lat += rand();
      lon += rand();
      frame += 1;
      hud.textContent = `LAT ${lat.toFixed(7)}\nLON ${lon.toFixed(7)}\nFRAME ${pad(frame)}`;
    }, 100);

    /* ── 모달 열기/닫기 ── */
    let closedCount = 0;
    let finalToastFired = false;

    function showAgreePage() {
      console.log('GO 클릭됨');
      document.getElementById('layout-overlay').style.display = 'block';
      document.getElementById('layout-box').style.display = 'block';
    }

    function enterTerms() {
      document.getElementById('layout-overlay').style.display = 'none';
      document.getElementById('layout-box').style.display = 'none';
      openModals();
    }

    function openModals() {
      closedCount = 0;
      finalToastFired = false;
      stampFired['modal-1'] = false;
      stampFired['modal-2'] = false;
      stampFired['modal-3'] = false;
      stampCount = 0;
      document.getElementById('agree-counter').style.visibility = 'visible';
      document.getElementById('overlay').classList.add('active');
      document.getElementById('modal-1').classList.add('active');
      scheduleStamp('modal-1');
      setTimeout(() => {
        document.getElementById('modal-2').classList.add('active');
        scheduleStamp('modal-2');
      }, 1000);
      setTimeout(() => {
        document.getElementById('modal-3').classList.add('active');
        scheduleStamp('modal-3');
      }, 2000);
      logAgreement('본 약관 전 조항에 대한 동의가 자동 등록되었습니다 ^^');
    }

    /* ── 도장 시스템 ── */
    const stampFired = {};
    let stampCount = 0;

    function scheduleStamp(modalId) {
      const num = modalId.split('-')[1];
      setTimeout(() => {
        if (!document.getElementById(modalId).classList.contains('active')) return;
        if (stampFired[modalId]) return;
        stampFired[modalId] = true;
        applyStamp(modalId, 'content-' + num);
      }, 3000);
    }

    function applyStamp(modalId, contentId) {
      const content = document.getElementById(contentId);

      const stamp = document.createElement('img');
      stamp.src = 'assets/finger.png';
      stamp.className = 'stamp';
      content.appendChild(stamp);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        stamp.classList.add('dropped');
      }));

      setTimeout(() => {
        // 박스 떨림
        content.classList.add('shaking');
        content.addEventListener('animationend', () => content.classList.remove('shaking'), { once: true });

        // 화면 플래시
        const flash = document.createElement('div');
        flash.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;pointer-events:none;animation:fadeIn 0.05s ease forwards;';
        document.body.appendChild(flash);
        setTimeout(() => {
          flash.style.animation = 'flashFadeOut 0.15s ease forwards';
          setTimeout(() => flash.remove(), 150);
        }, 50);

        agreementCount++;
        updateCounter();
        stampCount++;
        if (stampCount === 3) {
          showToast('서명이 완료되었습니다. 본 동의서는 영구 효력을 발생합니다 ^^');
        }
      }, 150);
    }

    function closeModal(id) {
      logAgreement('이탈 시도가 감지되었습니다. 본 행위는 제10조 ③항에 따라 모든 조항에 대한 최종 수락으로 처리됩니다 ^^');
      document.getElementById(id).classList.remove('active');

      const anyOpen = ['modal-1', 'modal-2', 'modal-3']
        .some(m => document.getElementById(m).classList.contains('active'));
      if (!anyOpen) document.getElementById('overlay').classList.remove('active');

      closedCount++;
      if (closedCount === 3 && !finalToastFired) {
        finalToastFired = true;
        showFinalToast('강한 부정은 강한 긍정입니다. 모든 약관에 대한 최종 동의가 완료되었습니다 ^^');
      }
    }

    function showFinalToast(message) {
      agreementCount++;
      updateCounter();

      // 클라이맥스 오버레이
      const climaxOverlay = document.createElement('div');
      climaxOverlay.className = 'climax-overlay';
      document.body.appendChild(climaxOverlay);

      showToast(message, true);

      setTimeout(() => {
        climaxOverlay.style.transition = 'opacity 0.5s ease';
        climaxOverlay.style.opacity = '0';
        setTimeout(() => climaxOverlay.remove(), 500);
      }, 7000);
    }

    /* ── 동의 시스템 ── */
    let agreementCount = 0;
    const activeWrappers = [];

    function logAgreement(message) {
      agreementCount++;
      updateCounter();
      showToast(message);
    }

    function updateCounter() {
      const el = document.getElementById('counter-num');
      el.textContent = `[ ${String(agreementCount).padStart(4, '0')} ]`;
      el.classList.remove('blink');
      void el.offsetWidth;
      el.classList.add('blink');
    }

    function showToast(message, isFinal = false) {
      const now = new Date();
      const time = [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');

      const wrapper = document.createElement('div');
      wrapper.className = 'toast-wrapper';
      wrapper.style.zIndex = isFinal ? '1001' : '999';

      const inner = document.createElement('div');
      inner.className = isFinal ? 'toast-final' : 'toast';
      inner.textContent = `[${time}]  [ 동의 #${agreementCount} ]  ${message}`;

      wrapper.appendChild(inner);
      document.body.appendChild(wrapper);

      const entry = { wrapper, yOffset: 0 };

      requestAnimationFrame(() => {
        const h = wrapper.offsetHeight;
        const shift = h + 12;

        // 기존 알림들을 위로 밀어 올림
        activeWrappers.forEach(item => {
          item.yOffset -= shift;
          item.wrapper.style.transform = `translateY(calc(-50% + ${item.yOffset}px))`;
        });
        activeWrappers.push(entry);

        // 다음 프레임에 등장 애니메이션 트리거
        requestAnimationFrame(() => {
          inner.classList.add('visible');
          if (isFinal) {
            setTimeout(() => inner.classList.add('shake'), 500);
          }
        });
      });

      const stay = isFinal ? 7000 : 4000;
      setTimeout(() => {
        inner.style.transition = 'opacity 0.5s ease';
        inner.style.opacity = '0';
        setTimeout(() => {
          wrapper.remove();
          const i = activeWrappers.indexOf(entry);
          if (i !== -1) activeWrappers.splice(i, 1);
        }, 500);
      }, stay);
    }


    /* ── 트리거 3: 마우스 3초 idle ── */
    let idleTimer = null;
    document.addEventListener('mousemove', () => {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        logAgreement('비활성 상태는 약관에 대한 충분한 숙고로 해석되며 묵시적 동의로 기록됩니다 ^^');
      }, 3000);
    });

    /* ── 트리거 5: 우클릭 ── */
    document.addEventListener('contextmenu', () => {
      logAgreement('약관 내용을 보존하려는 의사로 해석되며 신용 점수에 +5점이 가산됩니다 ^^');
    });
  </script>
</body>
</html>
