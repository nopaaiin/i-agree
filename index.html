<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Credit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background-color: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── 배경 레이어 ── */
    .main-bg {
      position: fixed;
      inset: 0;
      background-image: url('assets/main.png');
      background-size: cover;
      background-position: center;
      filter: blur(40px) brightness(0.5);
      transform: scale(1.05);
      z-index: 1;
    }

    .main-fg {
      position: fixed;
      inset: 0;
      background-image: url('assets/main.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 1;
    }

    /* ── HUD + GO 버튼 ── */
    .btn-group {
      position: fixed;
      right: 1.5%;
      bottom: 3%;
      width: 26%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      z-index: 20;
    }

    .hud {
      color: #ccff00;
      font-family: monospace;
      font-size: 11px;
      opacity: 0.8;
      line-height: 1.6;
      pointer-events: none;
      white-space: pre;
      text-align: right;
    }

    .go-btn {
      width: 100%;
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
    }

    .go-btn:active {
      transform: scale(0.92);
    }

    /* ── 동의 카운터 ── */
    .agree-counter {
      position: fixed;
      bottom: 3%;
      left: 3%;
      font-family: monospace;
      font-size: 14px;
      color: #ccff00;
      opacity: 0.9;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes counterBlink {
      0%   { opacity: 0.9; }
      40%  { opacity: 0.3; }
      100% { opacity: 0.9; }
    }

    .agree-counter-num.blink {
      animation: counterBlink 0.2s ease;
    }

    /* ── 레이아웃 페이지 ── */
    .layout-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 50;
      animation: fadeIn 0.3s ease;
    }

    .layout-box {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 80vh;
      z-index: 51;
    }

    .layout-img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }

    .layout-hotspot {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 50%;
      height: 50%;
      cursor: pointer;
    }

    .layout-hotspot:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    /* ── 오버레이 ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      animation: fadeIn 0.3s ease;
    }

    .overlay.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── 팝업 박스 공통 ── */
    .modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      height: 80vh;
      width: auto;
    }

    .modal.active {
      display: block;
    }

    .modal-img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }

    .modal-content {
      position: relative;
      height: 100%;
      width: 100%;
    }

    .stamp {
      position: absolute;
      right: 8%;
      bottom: 4%;
      width: 15%;
      height: auto;
      pointer-events: none;
      transition: transform 0.15s ease-out, opacity 0.15s ease-out;
    }

    @keyframes contentShake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-4px); }
      40%  { transform: translateX(4px); }
      60%  { transform: translateX(-2px); }
      80%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    .modal-content.shaking {
      animation: contentShake 0.1s ease;
    }

    @keyframes flashFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* 박스 (단일, 위치는 JS 제어) */
    .modal-1 {
      z-index: 101;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* 헤더 */
    .modal-header {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      z-index: 1;
    }

    .modal-close {
      font-size: 18px;
      color: #000;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      padding: 0;
    }

    .modal-close:hover { color: #333; }

    /* 매트릭스 레인 캔버스 */
    #matrix-rain {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      display: none;
    }

    /* ── 알림 토스트 ── */

    /* wrapper: 전체 뷰포트 너비, top 50% 기준으로 translateY(-50%) = 수직 중앙 */
    .toast-wrapper {
      position: fixed;
      left: 0;
      top: 50%;
      width: 100vw;
      transform: translateY(-50%);
      transition: transform 0.3s ease;
      pointer-events: none;
      display: flex;
      justify-content: center;
    }

    /* 일반 알림 */
    .toast {
      width: 60%;
      padding: 16px 32px;
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #ccff00;
      box-shadow: 0 0 20px rgba(204, 255, 0, 0.4);
      font-family: monospace;
      font-size: 14px;
      color: #ccff00;
      text-align: center;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.3s ease-out, transform 0.3s ease-out;
    }

    .toast.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* 클라이맥스 알림 */
    .toast-final {
      width: 75%;
      padding: 36px 48px;
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #ccff00;
      box-shadow: 0 0 50px rgba(204, 255, 0, 0.9), 0 0 100px rgba(204, 255, 0, 0.5), 0 0 150px rgba(204, 255, 0, 0.25);
      font-family: monospace;
      font-size: 20px;
      color: #ccff00;
      text-align: center;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }

    .toast-final.visible {
      opacity: 1;
      transform: scale(1);
    }

    @keyframes toastShake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-6px); }
      30%  { transform: translateX(6px); }
      45%  { transform: translateX(-4px); }
      60%  { transform: translateX(4px); }
      75%  { transform: translateX(-2px); }
      90%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    .toast-final.shake {
      animation: toastShake 0.15s ease;
    }

    /* 클라이맥스 오버레이 */
    .climax-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      pointer-events: none;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="main-bg"></div>
  <div class="main-fg"></div>

  <!-- 레이아웃 페이지 -->
  <div class="layout-overlay" id="layout-overlay"></div>
  <div class="layout-box" id="layout-box">
    <img class="layout-img" src="assets/layout.png" alt="">
    <div class="layout-hotspot" onclick="enterTerms()"></div>
  </div>

  <!-- 동의 카운터 -->
  <div class="agree-counter" id="agree-counter" style="visibility: hidden;">
    <div>AGREEMENTS LOGGED</div>
    <div>━━━━━━━━━━━━━</div>
    <div class="agree-counter-num" id="counter-num">[ 0000 ]</div>
  </div>

  <!-- HUD + GO 버튼 -->
  <div class="btn-group">
    <div class="hud" id="hud"></div>
    <img
      class="go-btn"
      src="assets/go.png"
      alt="GO"
      onclick="showAgreePage()"
    >
  </div>

  <canvas id="matrix-rain"></canvas>
  <div class="overlay" id="overlay"></div>

  <!-- 팝업 박스 -->
  <div class="modal modal-1" id="modal-1">
    <div class="modal-content" id="content-1">
      <img class="modal-img" src="assets/agree.png" alt="">
      <div class="modal-header">
        <button class="modal-close" id="modal-close-btn" onclick="closeBox()">✕</button>
      </div>
    </div>
  </div>


  <script>
    /* ── HUD ── */
    const hud = document.getElementById('hud');
    let lat = 37.5547213;
    let lon = 126.9706482;
    let frame = 4829;

    function rand() { return Math.random() * 0.0002 - 0.0001; }
    function pad(n) { return String(n).padStart(5, '0'); }

    setInterval(() => {
      lat += rand();
      lon += rand();
      frame += 1;
      hud.textContent = `LAT ${lat.toFixed(7)}\nLON ${lon.toFixed(7)}\nFRAME ${pad(frame)}`;
    }, 100);

    /* ── 동의 트리거 활성화 플래그 ── */
    let triggersActive = false;

    /* ── 모달 상태 ── */
    let closedCount = 0;
    let finalToastFired = false;
    let boxNumber = 0;
    let stampTimer = null;
    let stampInterval = null;
    let stampCount = 0;

    const closeMsgs = [
      '이탈 시도가 감지되었습니다. 본 행위는 제10조 ③항에 따라 모든 조항에 대한 최종 수락으로 처리됩니다 ^^',
      '다시 새로운 약관에 동의해주세요 ^^',
      '약관은 회피되지 않습니다. 본 시도는 동의 의사의 강한 표명으로 환산됩니다 ^^',
      '이탈은 동의의 한 형식입니다. 새 약관이 준비되었습니다 ^^',
      '본 약관은 닫혀도 효력을 유지합니다. 재확인을 위해 새 약관이 발급됩니다 ^^',
      '고객님의 적극적인 검토에 감사드립니다. 추가 약관이 도착했습니다 ^^',
      '회피 의사가 감지되었습니다. 본 시스템은 회피 의사를 동의로 자동 환산합니다 ^^',
      '약관은 무한히 갱신됩니다. 본 닫힘은 갱신의 신호로 해석됩니다 ^^',
    ];

    function showAgreePage() {
      triggersActive = false;
      clearTimeout(idleTimer);
      document.getElementById('layout-overlay').style.display = 'block';
      document.getElementById('layout-box').style.display = 'block';
    }

    function enterTerms() {
      document.getElementById('layout-overlay').style.display = 'none';
      document.getElementById('layout-box').style.display = 'none';
      openModals();
    }

    function openModals() {
      closedCount = 0;
      finalToastFired = false;
      boxNumber = 0;
      triggersActive = true;
      document.getElementById('agree-counter').style.visibility = 'visible';
      openBox();
    }

    function openBox() {
      boxNumber++;
      clearStamps();

      const offsetX = Math.round(Math.random() * 120 - 60);
      const offsetY = Math.round(Math.random() * 80 - 40);
      const rotation = (Math.random() * 6 - 3).toFixed(1);

      const modal = document.getElementById('modal-1');
      modal.style.opacity = '0';
      modal.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) rotate(${rotation}deg) scale(0.95)`;
      modal.classList.add('active');
      document.getElementById('overlay').classList.add('active');
      document.getElementById('modal-close-btn').textContent = `✕ ${String(boxNumber).padStart(2, '0')}`;

      requestAnimationFrame(() => requestAnimationFrame(() => {
        modal.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) rotate(${rotation}deg) scale(1)`;
        modal.style.opacity = '1';
      }));

      startMatrix();

      stampTimer = setTimeout(() => {
        applyStamp();
        stampInterval = setInterval(applyStamp, 2000);
      }, 2000);
    }

    /* ── 도장 시스템 ── */
    function clearStamps() {
      document.getElementById('content-1').querySelectorAll('.stamp').forEach(s => s.remove());
      stampCount = 0;
    }

    function applyStamp() {
      const content = document.getElementById('content-1');
      const stamp = document.createElement('img');
      stamp.src = 'assets/finger.png';
      stamp.className = 'stamp';

      const ox = Math.round(Math.random() * 30 - 15);
      const oy = Math.round(Math.random() * 20 - 10);
      const rot = (Math.random() * 50 - 25).toFixed(1);
      const finalOpacity = (0.7 + Math.random() * 0.3).toFixed(2);

      stamp.style.opacity = '0';
      stamp.style.transform = `translate(${ox}px, ${oy}px) scale(1.5) rotate(${rot}deg)`;
      content.appendChild(stamp);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        stamp.style.opacity = finalOpacity;
        stamp.style.transform = `translate(${ox}px, ${oy}px) scale(1) rotate(${rot}deg)`;
      }));

      setTimeout(() => {
        agreementCount++;
        updateCounter();
        stampCount++;
      }, 150);
    }

    function closeBox() {
      closedCount++;
      logAgreement(closeMsgs[(closedCount - 1) % closeMsgs.length]);

      clearTimeout(stampTimer);
      clearInterval(stampInterval);

      const modal = document.getElementById('modal-1');
      modal.classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
      stopMatrix();
      clearStamps();

      if (closedCount >= 5 && !finalToastFired) {
        finalToastFired = true;
        triggersActive = false;
        showFinalToast('강한 부정은 강한 긍정입니다. 모든 약관에 대한 최종 동의가 완료되었습니다 ^^');
      } else {
        setTimeout(openBox, 1000);
      }
    }

    function showFinalToast(message) {
      agreementCount++;
      updateCounter();
      const climaxOverlay = document.createElement('div');
      climaxOverlay.className = 'climax-overlay';
      document.body.appendChild(climaxOverlay);
      showToast(message, true);
      setTimeout(() => {
        climaxOverlay.style.transition = 'opacity 0.5s ease';
        climaxOverlay.style.opacity = '0';
        setTimeout(() => climaxOverlay.remove(), 500);
      }, 7000);
    }

    /* ── 동의 시스템 ── */
    let agreementCount = 0;
    const activeWrappers = [];

    function logAgreement(message) {
      agreementCount++;
      updateCounter();
      showToast(message);
    }

    function updateCounter() {
      const el = document.getElementById('counter-num');
      el.textContent = `[ ${String(agreementCount).padStart(4, '0')} ]`;
      el.classList.remove('blink');
      void el.offsetWidth;
      el.classList.add('blink');
    }

    function showToast(message, isFinal = false) {
      const now = new Date();
      const time = [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
      const wrapper = document.createElement('div');
      wrapper.className = 'toast-wrapper';
      wrapper.style.zIndex = isFinal ? '1001' : '999';
      const inner = document.createElement('div');
      inner.className = isFinal ? 'toast-final' : 'toast';
      inner.textContent = `[${time}]  [ 동의 #${agreementCount} ]  ${message}`;
      wrapper.appendChild(inner);
      document.body.appendChild(wrapper);
      const entry = { wrapper, yOffset: 0 };
      requestAnimationFrame(() => {
        const h = wrapper.offsetHeight;
        const shift = h + 12;
        activeWrappers.forEach(item => {
          item.yOffset -= shift;
          item.wrapper.style.transform = `translateY(calc(-50% + ${item.yOffset}px))`;
        });
        activeWrappers.push(entry);
        requestAnimationFrame(() => {
          inner.classList.add('visible');
          if (isFinal) setTimeout(() => inner.classList.add('shake'), 500);
        });
      });
      const stay = isFinal ? 7000 : 4000;
      setTimeout(() => {
        inner.style.transition = 'opacity 0.5s ease';
        inner.style.opacity = '0';
        setTimeout(() => {
          wrapper.remove();
          const i = activeWrappers.indexOf(entry);
          if (i !== -1) activeWrappers.splice(i, 1);
        }, 500);
      }, stay);
    }

    /* ── 매트릭스 레인 ── */
    let matrixActive = false;
    let matrixAnimId = null;

    function startMatrix() {
      const canvas = document.getElementById('matrix-rain');
      canvas.style.display = 'block';
      canvas.style.opacity = '1';
      canvas.style.transition = '';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const ctx = canvas.getContext('2d');
      const CHARS = '동의하십니까^^?'.split('');
      const colWidth = 45;
      const numCols = Math.ceil(canvas.width / colWidth) + 1;

      const columns = Array.from({ length: numCols }, (_, i) => {
        const fontSize = Math.floor(16 + Math.random() * 7);
        return {
          x: i * colWidth,
          headY: -(Math.random() * canvas.height) - CHARS.length * fontSize * 1.5,
          speed: canvas.height / (8 + Math.random() * 10),
          fontSize,
          lineH: fontSize * 1.5,
          opacity: 0.7 + Math.random() * 0.3,
        };
      });

      let lastTime = performance.now();
      matrixActive = true;

      function draw(now) {
        if (!matrixActive) return;
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        columns.forEach(col => {
          ctx.font = `${col.fontSize}px monospace`;
          ctx.shadowColor = 'rgba(204, 255, 0, 0.6)';
          ctx.shadowBlur = 6;
          CHARS.forEach((ch, i) => {
            const charY = col.headY + i * col.lineH;
            if (charY < -col.lineH || charY > canvas.height + col.lineH) return;
            ctx.globalAlpha = col.opacity * (1 - i / CHARS.length);
            ctx.fillStyle = '#ccff00';
            ctx.fillText(ch, col.x, charY);
          });
          ctx.shadowBlur = 0;
          col.headY += col.speed * dt;
          if (col.headY > canvas.height + 60) {
            col.headY = -(CHARS.length * col.lineH) - Math.random() * 300;
            col.speed = canvas.height / (8 + Math.random() * 10);
            col.fontSize = Math.floor(16 + Math.random() * 7);
            col.lineH = col.fontSize * 1.5;
            col.opacity = 0.7 + Math.random() * 0.3;
          }
        });

        ctx.globalAlpha = 1;
        matrixAnimId = requestAnimationFrame(draw);
      }

      matrixAnimId = requestAnimationFrame(draw);
    }

    function stopMatrix() {
      matrixActive = false;
      if (matrixAnimId) { cancelAnimationFrame(matrixAnimId); matrixAnimId = null; }
      const canvas = document.getElementById('matrix-rain');
      canvas.style.transition = 'opacity 1s ease';
      canvas.style.opacity = '0';
      setTimeout(() => {
        canvas.style.display = 'none';
        canvas.style.opacity = '1';
        canvas.style.transition = '';
      }, 1000);
    }

    /* ── 트리거: 마우스 idle ── */
    let idleTimer = null;
    document.addEventListener('mousemove', () => {
      if (!triggersActive) return;
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        logAgreement('비활성 상태는 약관에 대한 충분한 숙고로 해석되며 묵시적 동의로 기록됩니다 ^^');
      }, 10000);
    });

    /* ── 트리거: 우클릭 ── */
    document.addEventListener('contextmenu', () => {
      if (!triggersActive) return;
      logAgreement('약관 내용을 보존하려는 의사로 해석되며 신용 점수에 +5점이 가산됩니다 ^^');
    });
  </script>
</body>
</html>
